        <link rel="stylesheet" href="style.css" />

                border: none;
                text-align: left;
                cursor: pointer;
                font-size: 1rem;
                &:hover {
                    filter: brightness(0.95);
                }
                text-decoration: none;
                color: black;
                background: #c2c0e1;
            }
        </style>
    </head>
    <body>
        <div id="header">Transfort & RTD Timetable</div>

        <div id="container">
            <h2 id="title">View Timetable</h2>
            <div id="content" class="list">
                <div class="item"><a class="btn" href="gtfs_viewer_routes.html?company=transfort">Transfort</a></div>
                <div class="item"><a class="btn" href="gtfs_viewer_routes.html?company=rtd">RTD</a></div>
                <div class="item"><a class="btn" href="gtfs_viewer_routes.html?company=merged">Merged</a></div>
            </div>
            <br />
            <h2 id="title">Route Search</h2>
            <div id="content" class="list">
                <div class="item"><a class="btn" href="route_search.html?company=transfort">Transfort</a></div>
                <div class="item"><a class="btn" href="route_search.html?company=rtd">RTD</a></div>
                <div class="item"><a class="btn" href="route_search.html?company=merged">Merged</a></div>
            </div>
        </div>
    </body>
</html>
