<!doctype html>
<html lang="ja">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <title>Transfort & RTD Timetable</title>
        <link rel="stylesheet" href="style.css" />
        <style>
            table {
                border-collapse: collapse;
                width: 100%;
                font-size: min(1em, 2.5vw);
            }
            tr {
                border: 1px solid black;
                cursor: pointer;
                &:hover {
                    background-color: #ddd;
                }
                &.current {
                    background-color: #8dffc877;
                    &:hover {
                        background-color: #8dffc8;
                    }
                }
            }
            .route-icon {
                width: 3em;
                height: 1.4em;
                line-height: 1.4em;
                border-radius: 0.2em;
                display: inline-block;
            }
            td {
                padding: 8px 0;
                text-align: left;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div id="header">Transfort & RTD Timetable</div>

        <div id="container">
            <button id="backButton">← Back</button>

            <h2 id="title"></h2>

            <div style="margin-bottom: 16px">
                <input type="date" id="dateInput" />
            </div>

            <div id="content"></div>
        </div>
        <script>
            document.getElementById("dateInput").valueAsDate = new Date();
            document.getElementById("backButton").onclick = () => history.back();

            const params = new URLSearchParams(location.search);
            const company = params.get("company");
            const blockId = params.get("block_id");
            const tripId = params.get("trip_id");

            function regularizeStopName(name) {
                name = name.replace(/Transit Center/g, "Transit");
                name = name.replace(/Station/g, "Stn");
                name = name.replace(/Parkway/g, "Pkwy");
                name = name.replace(/Boulevard/g, "Blvd");
                name = name.replace(/Avenue/g, "Ave");
                name = name.replace(/Street/g, "St");
                name = name.replace(/Government/g, "Gov");
                name = name.replace(/\(((Light|Heavy) Rail|Bus)\)/g, "");
                return name;
            }

            (async () => {
                const [tripInfo, calendar, calendarDates, routeList] = await Promise.all([
                    fetch(`./gtfs_parsed/${company}/trip-info.json`).then((r) => r.json()),
                    fetch(`./gtfs_parsed/${company}/calendar.json`).then((r) => r.json()),
                    fetch(`./gtfs_parsed/${company}/calendar-dates.json`).then((r) => r.json()),
                    fetch(`./gtfs_parsed/${company}/route-list.json`).then((r) => r.json()),
                ]);

                function isServiceRunning(serviceId, date) {
                    const service = calendar[serviceId];
                    if (!service) return false;

                    const yyyymmdd = date.replaceAll("-", "");
                    const exceptions = calendarDates[serviceId] || [];
                    const exception = exceptions.find((entry) => entry.date === yyyymmdd);

                    if (exception) {
                        if (exception.exception_type === "1") return true;
                        if (exception.exception_type === "2") return false;
                    }
                    if (yyyymmdd < service.start_date) return false;
                    if (yyyymmdd > service.end_date) return false;

                    const weekdayNames = ["sunday", "monday", "tuesday", "wednesday", "thursday", "friday", "saturday"];
                    const weekday = weekdayNames[new Date(date).getDay()];
                    return service[weekday] === "1";
                }

                // blockIdを持つtripを取得
                const trips = Object.entries(tripInfo)
                    .map(([key, value]) => ({ ...value, trip_id: key }))
                    .filter((trip) => trip.block_id === blockId);

                const dateInput = document.getElementById("dateInput");
                function updateContent() {
                    // タイトルを更新
                    const title = document.getElementById("title");
                    title.textContent = `All trips for Block Number ${blockId?.trim().replace(/\s+/g, "-")}`;

                    // tripsを日付で絞り込み
                    const selectedDate = dateInput.value;
                    const filteredTrips = trips.filter((trip) => isServiceRunning(trip.service_id, selectedDate));

                    // filteredTripsを出発時刻でソート
                    filteredTrips.sort((a, b) => {
                        const timeA = a.origin_time || "99:99:99";
                        const timeB = b.origin_time || "99:99:99";
                        return timeA.localeCompare(timeB);
                    });

                    // 既存のテーブルをクリア
                    const contentDiv = document.getElementById("content");
                    contentDiv.innerHTML = "";

                    // 運用内のtripを順に行として表示
                    const table = document.createElement("table");
                    filteredTrips.forEach((trip) => {
                        const row = document.createElement("tr");
                        row.addEventListener("click", () => {
                            const url = `./gtfs_viewer_trip.html?company=${encodeURIComponent(company)}&trip_id=${encodeURIComponent(trip.trip_id)}&stop_sequence=1`;
                            window.location.href = url;
                        });
                        if (trip.trip_id === tripId) row.classList.add("current"); // リンク元のtripをハイライト

                        const tripIdCell = document.createElement("td");
                        tripIdCell.innerHTML = `${trip.trip_id}`;
                        row.appendChild(tripIdCell);

                        const routeNameCell = document.createElement("td");
                        const routeIcon = document.createElement("div");
                        routeIcon.className = "route-icon";
                        routeIcon.innerHTML = routeList.find((route) => route.route_id === trip.route_id)?.route_short_name?.toUpperCase() ?? "null";
                        routeIcon.style.backgroundColor = "#" + routeList.find((route) => route.route_id === trip.route_id)?.route_color ?? "000000";
                        routeIcon.style.color = "#" + routeList.find((route) => route.route_id === trip.route_id)?.route_text_color ?? "FFFFFF";
                        routeNameCell.appendChild(routeIcon);
                        row.appendChild(routeNameCell);

                        const originNameCell = document.createElement("td");
                        originNameCell.innerHTML = regularizeStopName(trip.origin);
                        row.appendChild(originNameCell);

                        const timeCell = document.createElement("td");
                        timeCell.innerHTML = `${trip.origin_time?.replace(/:/g, "") || "????"} > ${trip.destination_time?.replace(/:/g, "") || "????"}`;
                        row.appendChild(timeCell);

                        const destinationNameCell = document.createElement("td");
                        destinationNameCell.innerHTML = regularizeStopName(trip.destination);
                        row.appendChild(destinationNameCell);

                        table.appendChild(row);
                    });
                    contentDiv.appendChild(table);
                }

                dateInput.addEventListener("change", updateContent);
                updateContent();
            })();
        </script>
    </body>
</html>
