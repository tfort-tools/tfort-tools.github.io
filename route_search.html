<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>経路検索</title>
    </head>
    <body>
        <input id="fromInput" list="stations" />
        <input id="toInput" list="stations" />
        <datalist id="stations"></datalist>
        <input id="dateInput" type="date" />
        <input id="timeInput" type="time" />
        <button id="searchButton">検索</button>
        <div id="result"></div>
    </body>
    <script>
        const params = new URLSearchParams(location.search);
        const company = params.get("company");
        const resultElem = document.getElementById("result");
        function timeToSeconds(time) {
            const parts = time.split(":").map(Number);

            const h = parts[0] || 0;
            const m = parts[1] || 0;
            const s = parts[2] || 0;

            return h * 3600 + m * 60 + s;
        }

        function secondsToTime(sec) {
            sec %= 86400;
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
        }
        (async () => {
            // prefill station list for datalist
            const stationList = await fetch(`./gtfs_parsed/${company}/station-list.json`).then((r) => r.json());
            const dl = document.getElementById("stations");
            for (const station of stationList) {
                const option = document.createElement("option");
                option.value = station;
                dl.appendChild(option);
            }
            // prefill date and time with current date and time
            const now = new Date();

            const localDate = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 10);

            document.getElementById("dateInput").value = localDate;
            document.getElementById("timeInput").value = now.toTimeString().slice(0, 5);
            // load
            const [connections, calendar, calendarDates, tripInfo, tripStopTimes] = await Promise.all([
                fetch(`./gtfs_parsed/${company}/connections.json`).then((r) => r.json()),
                fetch(`./gtfs_parsed/${company}/calendar.json`).then((r) => r.json()),
                fetch(`./gtfs_parsed/${company}/calendar-dates.json`)
                    .then((r) => r.json())
                    .catch(() => ({})),
                fetch(`./gtfs_parsed/${company}/trip-info.json`).then((r) => r.json()),
                fetch(`./gtfs_parsed/${company}/trip-stop-times.json`).then((r) => r.json()),
            ]);
            // search

            const tripConnections = [];

            for (const conn of connections) {
                tripConnections.push({
                    from: conn.from,
                    to: conn.to,

                    departure_time: conn.departure_time,
                    arrival_time: conn.arrival_time,

                    departure_sequence: conn.departure_sequence,
                    arrival_sequence: conn.arrival_sequence,

                    trip_id: conn.trip_id,
                    service_id: conn.service_id,
                });
            }

            tripConnections.sort((a, b) => timeToSeconds(a.departure_time) - timeToSeconds(b.departure_time));

            console.log(
                tripConnections.slice(0, 20).map((c) => ({
                    dep: c.departure_time,
                    from: c.from,
                    to: c.to,
                })),
            );

            function isServiceRunning(serviceId, date) {
                const service = calendar[serviceId];
                if (!service) {
                    return false;
                }
                const yyyymmdd = date.replaceAll("-", "");
                const exceptions = (calendarDates[serviceId] || []).find((e) => e.date === yyyymmdd);
                if (exceptions) {
                    if (exceptions.exception_type === "1") {
                        return true;
                    }
                    if (exceptions.exception_type === "2") {
                        return false;
                    }
                }
                if (yyyymmdd < service.start_date || yyyymmdd > service.end_date) {
                    return false;
                }
                const weekdayNames = ["sunday", "monday", "tuesday", "wednesday", "thursday", "friday", "saturday"];
                const weekday = weekdayNames[new Date(date).getDay()];
                return service[weekday] === "1";
            }
            function searchRoute(fromStop, toStop, date, startTime) {
                const startSeconds = timeToSeconds(startTime);

                const states = new Map();
                const previous = new Map();

                states.set(fromStop, {
                    arrivalTime: startSeconds,
                    tripId: null,
                    transfers: 0,
                });

                for (const conn of tripConnections) {
                    if (!isServiceRunning(conn.service_id, date)) {
                        continue;
                    }

                    const state = states.get(conn.from);

                    if (!state) {
                        continue;
                    }

                    const dep = timeToSeconds(conn.departure_time);
                    const arr = timeToSeconds(conn.arrival_time);

                    const isTransfer = state.tripId !== null && state.tripId !== conn.trip_id;

                    const transferTime = isTransfer ? 60 : 0;

                    if (dep < state.arrivalTime + transferTime) {
                        continue;
                    }

                    const newTransfers = state.transfers + (isTransfer ? 1 : 0);

                    const best = states.get(conn.to);

                    const shouldUpdate = !best || arr < best.arrivalTime || (arr === best.arrivalTime && newTransfers < best.transfers);

                    if (!shouldUpdate) {
                        continue;
                    }

                    states.set(conn.to, {
                        arrivalTime: arr,
                        tripId: conn.trip_id,
                        transfers: newTransfers,
                    });

                    previous.set(conn.to, {
                        from: conn.from,
                        trip_id: conn.trip_id,
                        departure_time: conn.departure_time,
                        arrival_time: conn.arrival_time,
                    });
                }

                if (!states.has(toStop)) {
                    return null;
                }

                const path = [];

                let current = toStop;

                while (current !== fromStop) {
                    const prev = previous.get(current);

                    if (!prev) {
                        return null;
                    }

                    path.push({
                        stop: current,
                        trip_id: prev.trip_id,
                        from: prev.from,
                        to: current,
                        departure_time: prev.departure_time,
                        arrival_time: prev.arrival_time,
                    });

                    current = prev.from;
                }

                path.push({
                    stop: fromStop,
                });

                path.reverse();

                return path;
            }
            document.getElementById("searchButton").onclick = () => {
                const from = fromInput.value.trim();
                const to = toInput.value.trim();
                const date = dateInput.value;
                const time = timeInput.value;
                const result = searchRoute(from, to, date, time);
                renderResult(result);
            };

            function compressPath(path) {
                if (!path || path.length <= 1) {
                    return path;
                }

                const result = [
                    {
                        stop: path[0].stop,
                    },
                ];

                let segmentStart = path[1];

                for (let i = 2; i < path.length; i++) {
                    if (path[i].trip_id !== segmentStart.trip_id) {
                        result.push({
                            stop: path[i - 1].stop,

                            trip_id: segmentStart.trip_id,

                            from: segmentStart.from,
                            to: path[i - 1].stop,

                            departure_time: segmentStart.departure_time,
                            arrival_time: path[i - 1].arrival_time,
                        });

                        segmentStart = path[i];
                    }
                }

                const last = path[path.length - 1];

                result.push({
                    stop: last.stop,

                    trip_id: segmentStart.trip_id,

                    from: segmentStart.from,
                    to: last.stop,

                    departure_time: segmentStart.departure_time,
                    arrival_time: last.arrival_time,
                });

                return result;
            }

            function renderResult(path) {
                path = compressPath(path);
                console.log(path);
                resultElem.innerHTML = "";
                if (!path) {
                    resultElem.textContent = "経路が見つかりません";
                    return;
                }
                for (let i = 0; i < path.length; i++) {
                    const row = document.createElement("div");
                    row.className = "routeRow";
                    if (i === 0) {
                        row.innerHTML = `<div>${path[i].stop}</div>`;
                    } else {
                        const trip = tripInfo[path[i].trip_id];
                        row.innerHTML = `<div>${path[i].departure_time}↓${trip.route_id} ${trip.destination}</div>
                            <div>${path[i].stop} (${path[i].arrival_time})</div>`;
                    }
                    resultElem.appendChild(row);
                }
            }
        })();
    </script>
</html>
