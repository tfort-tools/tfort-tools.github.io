<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Route Search</title>
        <link rel="stylesheet" href="style.css" />
        <style>
            .inputContainer {
                margin: 2vw;
                align-items: center;
            }
            #searchButton {
                padding: 5px 10px;
                font-size: 16px;
            }
            #result {
                margin: 2vw;
            }
            .routeRow {
                margin-bottom: 0px;
            }
            .routeContainer {
                .station {
                    padding: 0.5em 0 0.5em 3em;
                    margin: 0.5em 0 1em 0;
                    border-top: 1px solid #ccc;
                    border-bottom: 1px solid #ccc;
                    a {
                        color: unset;
                        text-decoration: none;
                    }
                }
                .stationBetween {
                    position: relative;
                    &:has(.rideLine) {
                        &:has(.hiddenStationsContainer.isHidden), &:not(:has(.hiddenStationsContainer)) {
                            min-height: 6em;
                        }
                        &:has(.hiddenStationsContainer:not(.isHidden)) {
                            min-height: calc(6em + var(--hidden-count) * 3em);
                        }
                    }
                    &:has(.walkLine) {
                        min-height: 4em;
                    }
                    .rideIcon {
                        position: absolute;
                        left: 4.25em;
                        top: 0.75em;
                        border-radius: 50%;
                        text-align: center;
                        line-height: 2em;
                        width: 2em;
                        height: 2em;
                        transform: translate(-50%, -50%);
                        background: var(--route-color);
                        color: black;
                        z-index: 2;
                        &::after {
                            content: var(--route-id);
                            position: absolute;
                            left: 50%;
                            top: 50%;
                            text-align: center;
                            border-radius: 50%;
                            width: 1.5em;
                            height: 1.5em;
                            line-height: 1.4em; /* somehow this is better than 1.5em */
                            background: white;
                            transform: translate(-50%, -50%);
                            z-index: 3;
                        }
                    }
                    .rideLine,
                    .walkLine {
                        position: absolute;
                        left: 4em;
                        top: 0.1em;
                        bottom: 0;
                        width: 0.5em;
                        background: var(--route-color);
                        z-index: 1;
                    }
                    .walkLine {
                        background: repeating-linear-gradient(to bottom, gray 0, gray 0.25em, transparent 0.25em, transparent 0.5em);
                    }
                    .depTime,
                    .arrTime {
                        position: absolute;
                        font-weight: bold;
                        left: 0.5em;
                    }
                    .arrTime {
                        bottom: 0;
                    }
                    .rideInfo,
                    .walkInfo {
                        position: absolute;
                        left: 6em;
                        top: 0;
                        .line {
                            font-weight: bold;
                        }
                        .dest {
                            font-size: 0.9em;
                        }
                    }
                    .rideNstops {
                        position: absolute;
                        left: 6em;
                        top: 4.5em;
                    }
                    .hiddenStationsContainer {
                        position: relative;
                        top: 5em;
                        &.isHidden {
                            display: none;
                        }
                        .hiddenDepTime {
                            position: absolute;
                            left: 1.2em;
                            top: 0.25em;
                            font-size: 0.8em;
                        }
                        .hiddenStaDot {
                            position: absolute;
                            left: 4.25em;
                            top: 0.7em;
                            transform: translate(-50%, -47%);
                            z-index: 2;
                            width: 1em;
                            height: 1em;
                            background: var(--route-color);
                            border-radius: 50%;
                            &:after {
                                content: "";
                                position: absolute;
                                left: 50%;
                                top: 50%;
                                transform: translate(-50%, -50%);
                                width: 0.5em;
                                height: 0.5em;
                                background: white;
                                border-radius: 50%;
                            }
                        }
                        .hiddenStationName {
                            position: absolute;
                            left: 6em;
                            a {
                                text-decoration: none;
                                color: unset;
                            }
                        }
                    }
                }
            }
        </style>
    </head>
    <body>
        <div class="inputContainer">
            <!-- add value for easier debug, remove before deployment -->
            <label>From: <input id="fromInput" list="stations" value="Littleton / Mineral Ave Station" /></label>
            <button id="swapButton">Swap</button>
            <label>To: <input id="toInput" list="stations" value="Denver Airport Station" /> </label>
            <datalist id="stations"></datalist>
            <br /><br />
            <label>
                <select id="timeIsForWhat">
                    <option value="departure">Depart at</option>
                    <option value="arrival">Arrive by</option>
                    <option value="first">Use First Bus</option>
                    <option value="last" selected>Use Last Bus</option>
                </select>
            </label>
            <label>Date:<input id="dateInput" type="date" /></label>
            <button id="decrementTime">- 1 min</button>
            <label>Time:<input id="timeInput" type="time" /></label>
            <button id="incrementTime">+ 1 min</button><br />
            <label><input type="checkbox" id="preferLateDeparture" />Prefer late departure (If more than two routes arrive at the same time found, show the latest departure)</label><br />
            <label><input type="checkbox" id="noWalk" />Force bus (Don't walk to nearby bus stops, only use same-stop transfers)</label>
            <br /><br />
            <button id="searchButton">Search</button>
        </div>
        <div id="result"></div>
    </body>
    <script>
        const params = new URLSearchParams(location.search);
        const company = params.get("company");
        if (!company) window.location.href = "index.html";
        const resultElem = document.getElementById("result");
        // fix midnight operation, user input 0:00 to 2:59 is considered as yesterday 24:00 to 26:59
        const dayBoundaryHour = 3;
        function getServiceDateAndSeconds(dateStr, timeStr) {
            const [year, month, day] = dateStr.split("-").map(Number);
            const [hour, minute] = timeStr.split(":").map(Number);
            const serviceDate = new Date(year, month - 1, day);
            let serviceSeconds;
            if (hour < dayBoundaryHour) {
                serviceDate.setDate(serviceDate.getDate() - 1);
                serviceSeconds = (hour + 24) * 3600 + minute * 60;
            } else {
                serviceSeconds = hour * 3600 + minute * 60;
            }
            return { serviceDate, serviceSeconds };
        }
        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, "0");
            const d = String(date.getDate()).padStart(2, "0");
            return `${y}-${m}-${d}`;
        }
        function timeToSeconds(time) {
            const parts = time.split(":").map(Number);
            const h = parts[0] || 0;
            const m = parts[1] || 0;
            const s = parts[2] || 0;
            return h * 3600 + m * 60 + s;
        }
        function secondsToTime(sec) {
            sec %= 86400;
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
        }
        (async () => {
            // prefill station list for datalist
            const stationList = await fetch(`./gtfs_parsed/${company}/station-list.json`).then((r) => r.json());
            const dl = document.getElementById("stations");
            for (const station of stationList) {
                const option = document.createElement("option");
                option.value = station;
                dl.appendChild(option);
            }
            // prefill date and time with current date and time
            const now = new Date();
            const localDate = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 10);
            document.getElementById("dateInput").value = localDate;
            document.getElementById("timeInput").value = now.toTimeString().slice(0, 5);
            document.getElementById("swapButton").onclick = () => {
                const from = document.getElementById("fromInput").value;
                const to = document.getElementById("toInput").value;
                document.getElementById("fromInput").value = to;
                document.getElementById("toInput").value = from;
            };

            document.getElementById("incrementTime").onclick = () => {
                const timeInput = document.getElementById("timeInput");
                const time = timeInput.value;
                if (!time) {
                    return;
                }
                const seconds = timeToSeconds(time);
                const newTime = secondsToTime(seconds + 60);
                timeInput.value = newTime;
            };
            document.getElementById("decrementTime").onclick = () => {
                const timeInput = document.getElementById("timeInput");
                const time = timeInput.value;
                if (!time) {
                    return;
                }
                const seconds = timeToSeconds(time);
                const newTime = secondsToTime(seconds - 60);
                timeInput.value = newTime;
            };

            // load
            const [connections, calendar, calendarDates, tripInfo, tripStopTimes, routeList] = await Promise.all([
                fetch(`./gtfs_parsed/${company}/connections.json`).then((r) => r.json()),
                fetch(`./gtfs_parsed/${company}/calendar.json`).then((r) => r.json()),
                fetch(`./gtfs_parsed/${company}/calendar-dates.json`)
                    .then((r) => r.json())
                    .catch(() => ({})),
                fetch(`./gtfs_parsed/${company}/trip-info.json`).then((r) => r.json()),
                fetch(`./gtfs_parsed/${company}/trip-stop-times.json`).then((r) => r.json()),
                fetch(`./gtfs_parsed/${company}/route-list.json`).then((r) => r.json()),
            ]);

            // load walking connections if exists
            const walkingConnections = await fetch(`./gtfs_addon/${company}/walking-connections.json`)
                .then((r) => r.json())
                .catch(() => alert("No walking connection file."));
            // search
            const tripConnections = [];
            for (const conn of connections) {
                tripConnections.push({
                    from: conn.from,
                    to: conn.to,
                    departure_time: conn.departure_time,
                    arrival_time: conn.arrival_time,
                    departure_sequence: conn.departure_sequence,
                    arrival_sequence: conn.arrival_sequence,
                    trip_id: conn.trip_id,
                    service_id: conn.service_id,
                });
            }
            tripConnections.sort((a, b) => timeToSeconds(a.departure_time) - timeToSeconds(b.departure_time));
            const departuresFrom = {};
            const arrivalsTo = {};
            for (const conn of tripConnections) {
                if (!departuresFrom[conn.from]) {
                    departuresFrom[conn.from] = [];
                }
                departuresFrom[conn.from].push(conn);
                if (!arrivalsTo[conn.to]) {
                    arrivalsTo[conn.to] = [];
                }
                arrivalsTo[conn.to].push(conn);
            }
            for (const stop in departuresFrom) {
                departuresFrom[stop].sort((a, b) => timeToSeconds(a.departure_time) - timeToSeconds(b.departure_time));
            }
            for (const stop in arrivalsTo) {
                // a - b or b - a ? (need confirmation)
                arrivalsTo[stop].sort((a, b) => timeToSeconds(b.arrival_time) - timeToSeconds(a.arrival_time));
            }
            function isBetterForward(a, b, preferLateDeparture) {
                if (!b) {
                    return true;
                }
                if (a.arrivalTime !== b.arrivalTime) {
                    return a.arrivalTime < b.arrivalTime;
                }
                if (a.transfers !== b.transfers) {
                    return a.transfers < b.transfers;
                }
                if (a.walkCount !== b.walkCount) {
                    return a.walkCount < b.walkCount;
                }
                if (preferLateDeparture) {
                    return a.firstDeparture > b.firstDeparture;
                }
                return a.firstDeparture < b.firstDeparture;
            }
            function isBetterBackward(a, b) {
                if (!b) {
                    return true;
                }
                if (a.departureTime !== b.departureTime) {
                    return a.departureTime > b.departureTime;
                }
                if (a.transfers !== b.transfers) {
                    return a.transfers < b.transfers;
                }
                return false;
            }
            function getTransferTime(stop) {
                const transferTimes = {
                    // add specific transfer times for certain stops if needed like this:
                    // "South Transit Center": 180
                };
                return transferTimes[stop] ?? 60;
            }
            function isServiceRunning(serviceId, date) {
                const service = calendar[serviceId];
                if (!service) {
                    return false;
                }
                const yyyymmdd = date.replaceAll("-", "");
                const exceptions = (calendarDates[serviceId] || []).find((e) => e.date === yyyymmdd);
                if (exceptions) {
                    if (exceptions.exception_type === "1") {
                        return true;
                    }
                    if (exceptions.exception_type === "2") {
                        return false;
                    }
                }
                if (yyyymmdd < service.start_date || yyyymmdd > service.end_date) {
                    return false;
                }
                const weekdayNames = ["sunday", "monday", "tuesday", "wednesday", "thursday", "friday", "saturday"];
                const weekday = weekdayNames[new Date(date).getDay()];
                return service[weekday] === "1";
            }
            function searchRouteByDepTime(fromStop, toStop, date, depTime, noWalk, preferLateDeparture = false) {
                const { serviceDate, serviceSeconds } = getServiceDateAndSeconds(date, depTime);
                const startSeconds = serviceSeconds;
                const queue = [];
                const startState = {
                    stop: fromStop,
                    arrivalTime: startSeconds,
                    tripId: null,
                    transfers: 0,
                    walkCount: 0,
                    firstDeparture: null,
                    prev: null,
                    connection: null,
                };
                queue.push(startState);
                const bestStates = new Map();
                while (queue.length > 0) {
                    queue.sort((a, b) => {
                        if (a.arrivalTime !== b.arrivalTime) {
                            return a.arrivalTime - b.arrivalTime;
                        }
                        if (a.transfers !== b.transfers) {
                            return a.transfers - b.transfers;
                        }
                        if (a.walkCount !== b.walkCount) {
                            return a.walkCount - b.walkCount;
                        }
                        if (a.firstDeparture != null && b.firstDeparture != null) {
                            return preferLateDeparture ? b.firstDeparture - a.firstDeparture : a.firstDeparture - b.firstDeparture;
                        }
                        return 0;
                    });
                    const state = queue.shift();
                    const stateKey = `${state.stop}|${state.tripId ?? "none"}`;
                    const knownBest = bestStates.get(stateKey);
                    if (knownBest && !isBetterForward(state, knownBest, preferLateDeparture)) {
                        continue;
                    }
                    bestStates.set(stateKey, state);
                    if (state.stop === toStop) {
                        const path = [];
                        let current = state;
                        while (current.connection) {
                            if (current.connection.type === "walk") {
                                path.push({
                                    type: "walk",
                                    stop: current.connection.to,
                                    from: current.connection.from,
                                    to: current.connection.to,
                                    duration: current.connection.duration,
                                });
                                current = current.prev;
                                continue;
                            }
                            path.push({
                                stop: current.stop,
                                trip_id: current.connection.trip_id,
                                from: current.connection.from,
                                to: current.connection.to,
                                isOriginal: current.connection.departure_sequence === 1, // 当駅始発
                                departure_time: current.connection.departure_time,
                                arrival_time: current.connection.arrival_time,
                            });
                            current = current.prev;
                        }
                        path.push({
                            stop: fromStop,
                        });
                        path.reverse();
                        return path;
                    }
                    const departures = departuresFrom[state.stop] ?? [];
                    for (const conn of departures) {
                        const serviceDateStr = formatDate(serviceDate);
                        if (!isServiceRunning(conn.service_id, serviceDateStr)) {
                            continue;
                        }
                        const dep = timeToSeconds(conn.departure_time);
                        const arr = timeToSeconds(conn.arrival_time);
                        const isTransfer = state.tripId !== null && state.tripId !== conn.trip_id;
                        const requiredTransferTime = isTransfer ? getTransferTime(state.stop) : 0;
                        if (dep < state.arrivalTime + requiredTransferTime) {
                            continue;
                        }
                        const nextState = {
                            stop: conn.to,
                            arrivalTime: arr,
                            tripId: conn.trip_id,
                            transfers: state.transfers + (isTransfer ? 1 : 0),
                            walkCount: state.walkCount,
                            firstDeparture: state.firstDeparture ?? dep,
                            prev: state,
                            connection: conn,
                        };
                        const nextKey = `${nextState.stop}|${nextState.tripId ?? "none"}`;
                        const currentBest = bestStates.get(nextKey);
                        if (isBetterForward(nextState, currentBest, preferLateDeparture)) {
                            queue.push(nextState);
                        }
                    }

                    if (!noWalk) {
                        const walks = walkingConnections[state.stop];
                        if (walks) {
                            for (const [toStop, minutes] of Object.entries(walks)) {
                                const nextState = {
                                    stop: toStop,
                                    arrivalTime: state.arrivalTime + minutes * 60,
                                    tripId: state.tripId,
                                    transfers: state.transfers,
                                    walkCount: state.walkCount + 1,
                                    firstDeparture: state.firstDeparture,
                                    prev: state,
                                    connection: {
                                        type: "walk",
                                        from: state.stop,
                                        to: toStop,
                                        duration: minutes,
                                    },
                                };
                                const nextKey = `${nextState.stop}|${nextState.tripId ?? "none"}`;
                                const currentBest = bestStates.get(nextKey);
                                if (isBetterForward(nextState, currentBest, preferLateDeparture)) {
                                    queue.push(nextState);
                                }
                            }
                        }
                    }
                }
                return null;
            }
            function searchRouteByArrTime(fromStop, toStop, date, arrTime, noWalk) {
                const { serviceDate, serviceSeconds } = getServiceDateAndSeconds(date, arrTime);
                const targetSeconds = serviceSeconds;
                const queue = [];
                queue.push({
                    stop: toStop,
                    departureTime: targetSeconds,
                    tripId: null,
                    transfers: 0,
                    walkCount: 0,
                    prev: null,
                    connection: null,
                });
                const bestStates = new Map();
                while (queue.length > 0) {
                    queue.sort((a, b) => {
                        if (a.departureTime !== b.departureTime) {
                            return b.departureTime - a.departureTime;
                        }
                        return a.transfers - b.transfers;
                    });
                    const state = queue.shift();
                    const stateKey = `${state.stop}|${state.tripId ?? "none"}`;
                    const knownBest = bestStates.get(stateKey);
                    if (knownBest && !isBetterBackward(state, knownBest)) {
                        continue;
                    }
                    bestStates.set(stateKey, state);
                    if (state.stop === fromStop) {
                        const path = [];
                        let current = state;
                        while (current.connection) {
                            if (current.connection.type === "walk") {
                                path.push({
                                    type: "walk",
                                    stop: current.connection.to,
                                    from: current.connection.from,
                                    to: current.connection.to,
                                    duration: current.connection.duration,
                                });
                                current = current.prev;
                                continue;
                            }
                            path.push({
                                stop: current.connection.to,
                                trip_id: current.connection.trip_id,
                                from: current.connection.from,
                                to: current.connection.to,
                                departure_time: current.connection.departure_time,
                                arrival_time: current.connection.arrival_time,
                            });
                            current = current.prev;
                        }
                        path.unshift({
                            stop: fromStop,
                        });
                        return path;
                    }
                    const arrivals = arrivalsTo[state.stop] ?? [];
                    for (const conn of arrivals) {
                        const serviceDateStr = formatDate(serviceDate);
                        if (!isServiceRunning(conn.service_id, serviceDateStr)) {
                            continue;
                        }
                        const dep = timeToSeconds(conn.departure_time);
                        const arr = timeToSeconds(conn.arrival_time);
                        const isTransfer = state.tripId !== null && state.tripId !== conn.trip_id;
                        const requiredTransferTime = isTransfer ? getTransferTime(state.stop) : 0;
                        if (arr > state.departureTime - requiredTransferTime) {
                            continue;
                        }
                        queue.push({
                            stop: conn.from,
                            departureTime: dep,
                            tripId: conn.trip_id,
                            transfers: state.transfers + (isTransfer ? 1 : 0),
                            walkCount: state.walkCount,
                            prev: state,
                            connection: conn,
                        });
                    }
                    if (!noWalk) {
                        const walks = walkingConnections[state.stop];

                        if (walks) {
                            for (const [fromStop, minutes] of Object.entries(walks)) {
                                const nextState = {
                                    stop: fromStop,

                                    departureTime: state.departureTime - minutes * 60,

                                    tripId: state.tripId,

                                    transfers: state.transfers,
                                    walkCount: state.walkCount + 1,

                                    lastArrival: state.lastArrival,

                                    prev: state,

                                    connection: {
                                        type: "walk",

                                        from: fromStop,
                                        to: state.stop,

                                        duration: minutes,
                                    },
                                };

                                const nextKey = `${nextState.stop}|${nextState.tripId ?? "none"}`;

                                const currentBest = bestStates.get(nextKey);

                                if (isBetterBackward(nextState, currentBest, preferLateDeparture)) {
                                    queue.push(nextState);
                                }
                            }
                        }
                    }
                }
                return null;
            }

            document.getElementById("timeIsForWhat").onchange = () => {
                const timeIsForWhat = document.getElementById("timeIsForWhat").value;
                const timeInputElem = document.querySelector("label:has(> #timeInput)");
                const preferLateDepartureElem = document.querySelector("label:has(> #preferLateDeparture)");
                if (timeIsForWhat === "first" || timeIsForWhat === "last") {
                    timeInputElem.style.display = "none";
                    timeInputElem.disabled = true;
                } else {
                    timeInputElem.style.display = "inline-block";
                    timeInputElem.disabled = false;
                }
                if (timeIsForWhat === "departure" || timeIsForWhat === "first") {
                    preferLateDepartureElem.style.display = "inline-block";
                    preferLateDepartureElem.disabled = false;
                } else {
                    preferLateDepartureElem.style.display = "none";
                    preferLateDepartureElem.disabled = true;
                }
            };

            document.getElementById("searchButton").onclick = () => {
                const from = fromInput.value.trim();
                const to = toInput.value.trim();
                const timeIsForWhat = document.getElementById("timeIsForWhat").value;
                const date = dateInput.value;
                const time = timeInput.value;
                const preferLateDeparture = document.getElementById("preferLateDeparture").checked;
                const noWalk = document.getElementById("noWalk").checked;
                let result;
                let resultRenderMethod;
                switch (timeIsForWhat) {
                    case "departure":
                        result = searchRouteByDepTime(from, to, date, time, noWalk, preferLateDeparture);
                        resultRenderMethod = "forward";
                        break;
                    case "arrival":
                        result = searchRouteByArrTime(from, to, date, time, noWalk);
                        resultRenderMethod = "backward";
                        break;
                    case "first": {
                        result = searchRouteByDepTime(from, to, date, `${dayBoundaryHour.toString().padStart(2, "0")}:00:00`, noWalk, preferLateDeparture);
                        resultRenderMethod = "forward";
                        break;
                    }
                    case "last": {
                        result = searchRouteByArrTime(from, to, date, `${(dayBoundaryHour + 23).toString().padStart(2, "0")}:59:00`, noWalk);
                        resultRenderMethod = "backward";
                        break;
                    }
                }
                renderResult(result, resultRenderMethod);
            };

            function processPath(path) {
                if (!path || path.length === 0) return path;

                const result = path.map((item) => ({ ...item }));

                let currentTrip = null;
                let startIndex = -1;

                for (let i = 0; i < result.length; i++) {
                    const item = result[i];
                    if (item.type === "walk" || !item.trip_id) {
                        currentTrip = null;
                        startIndex = -1;
                        continue;
                    }
                    if (currentTrip === null) {
                        currentTrip = item.trip_id;
                        startIndex = i;
                        continue;
                    }
                    if (item.trip_id === currentTrip) {
                        if (i - startIndex > 1) result[i - 1].hidden = true;
                        continue;
                    }
                    currentTrip = item.trip_id;
                    startIndex = i;
                }
                return result;
            }

            function renderResult(originalPath, renderMethod) {
                console.log("Original path:", originalPath);
                if (!originalPath) {
                    resultElem.textContent = "No route found for specified criteria.";
                    return;
                }
                const path = processPath(originalPath);
                console.log("Processed path:", path);

                let depOverall = path.find((p) => p.departure_time)?.departure_time;
                let arrOverall = path
                    .slice()
                    .reverse()
                    .find((p) => p.arrival_time)?.arrival_time;
                if (!depOverall || !arrOverall) {
                    const timeInput = document.getElementById("timeInput").value;
                    depOverall = timeInput;
                    arrOverall = timeInput;
                }
                console.log(`Initial overall departure time: ${depOverall}, arrival time: ${arrOverall}`);

                const depSec = timeToSeconds(depOverall);
                const arrSec = timeToSeconds(arrOverall);
                if (path.slice(1).every((p) => p.type === "walk")) {
                    const totalWalkDuration = path.reduce((sum, p) => sum + (p.duration || 0), 0);
                    if (renderMethod === "forward") {
                        arrOverall = secondsToTime(depSec + totalWalkDuration * 60);
                    } else {
                        depOverall = secondsToTime(arrSec - totalWalkDuration * 60);
                    }
                } else {
                    if (path[1].type === "walk") {
                        depOverall = secondsToTime(depSec - path[1].duration * 60);
                    }
                    if (path[path.length - 1].type === "walk") {
                        arrOverall = secondsToTime(arrSec + path[path.length - 1].duration * 60);
                    }
                }
                depOverall = secondsToTime(depSec);
                arrOverall = secondsToTime(arrSec);
                console.log(`Adjusted overall departure time: ${depOverall}, arrival time: ${arrOverall}`);

                resultElem.innerHTML = `<div style="font-weight: bold; font-size: 1.5em;">${depOverall} > ${arrOverall}</div><br />`;
                const routeContainerElem = document.createElement("div");
                routeContainerElem.className = "routeContainer";
                for (let i = 0; i < path.length; i++) {
                    if (i === 0) {
                        routeContainerElem.innerHTML += `
                            <div class="station"><a target="_blank" href="/gtfs_viewer_stops.html?popup=1&stop_key=${encodeURIComponent(path[i].stop)}&company=${encodeURIComponent(company)}">${path[i].stop}</a></div>`;
                    } else {
                        if (path[i].type === "walk") {
                            routeContainerElem.innerHTML += `
                            <div class="stationBetween">
                                <div class="walkLine"></div>
                                <div class="walkInfo"><b>Walk</b><br />${path[i].duration} min</div>
                            </div>
                            <div class="station"><a target="_blank" href="/gtfs_viewer_stops.html?popup=1&stop_key=${encodeURIComponent(path[i].stop)}&company=${encodeURIComponent(company)}">${path[i].stop}</a></div>`;
                        } else {
                            let { route_id, destination } = tripInfo[path[i].trip_id];
                            const { route_color, route_text_color } = routeList.find((r) => r.route_id === route_id) || { route_color: "aaaaaa", route_text_color: "000000" };
                            if (company == "rtd") route_id = route_id.match(/[A-Z]/)[0]; // RTD has like "101A", remove numbers not displayed in signs

                            const stationBetweenElem = document.createElement("div");
                            stationBetweenElem.className = "stationBetween";
                            stationBetweenElem.style.setProperty("--route-color", `#${route_color}`);
                            stationBetweenElem.style.setProperty("--route-text-color", `#${route_text_color}`);
                            stationBetweenElem.style.setProperty("--route-id", `"${route_id}"`);

                            let lineNameDisplay;
                            if (company == "rtd") {
                                if (["A", "B", "G", "N"].includes(route_id)) {
                                    lineNameDisplay = `${route_id} Line Train`;
                                } else {
                                    lineNameDisplay = `${route_id} Line Tram`;
                                }
                            }
                            if (company == "transfort") {
                                if (route_id == "MAX") {
                                    lineNameDisplay = `${route_id} Rapid Transit`;
                                } else {
                                    lineNameDisplay = `Route ${route_id} Bus`;
                                }
                            }

                            stationBetweenElem.innerHTML = `
                                <div class="depTime">${path[i].departure_time}</div>
                                <div class="rideIcon"></div>
                                <div class="rideLine"></div>
                                <div class="rideInfo">
                                    <div class="line">${lineNameDisplay}</div>
                                    <div class="dest">For ${destination}</div>
                                </div>`;

                            if (i + 1 < path.length && path[i + 1].hidden) {
                                let hiddenCount = 0;
                                for (let j = i + 1; j < path.length; j++) {
                                    if (path[j].hidden) {
                                        hiddenCount++;
                                    } else {
                                        break;
                                    }
                                }
                                if (hiddenCount > 0) {
                                    const rideNstopsElem = document.createElement("div");
                                    rideNstopsElem.className = "rideNstops";
                                    rideNstopsElem.textContent = `Ride ${hiddenCount + 2} stops ▽`;
                                    rideNstopsElem.style.cursor = "pointer";
                                    const hiddenStationsContainer = document.createElement("div");
                                    hiddenStationsContainer.className = "hiddenStationsContainer isHidde"; // DEBUG
                                    for (let j = i; j <= i + hiddenCount; j++) {
                                        const hiddenStationElem = document.createElement("div");
                                        hiddenStationElem.className = "hiddenStation";
                                        hiddenStationElem.style.position = "absolute";
                                        hiddenStationElem.style.top = `${(j - i + 1) * 3}em`;
                                        hiddenStationElem.style.width = "stretch";
                                        hiddenStationElem.setAttribute("--route-color", `#${route_color}`);
                                        hiddenStationElem.innerHTML = `
                                    <div class="hiddenDepTime">${path[j].arrival_time}</div>
                                    <div class="hiddenStaDot"></div>
                                    <div class="hiddenStationName">
                                        <a target="_blank" href="/gtfs_viewer_stops.html?popup=1&stop_key=${encodeURIComponent(path[j].stop)}&company=${encodeURIComponent(company)}">${path[j].stop}</a>
                                    </div>`;
                                        hiddenStationsContainer.appendChild(hiddenStationElem);
                                    }
                                    rideNstopsElem.addEventListener("click", () => {
                                        if (hiddenStationsContainer.classList.contains("isHidden")) {
                                            hiddenStationsContainer.classList.remove("isHidden");
                                            rideNstopsElem.textContent = `Ride ${hiddenCount + 2} stops △`;
                                        } else {
                                            hiddenStationsContainer.classList.add("isHidden");
                                            rideNstopsElem.textContent = `Ride ${hiddenCount + 2} stops ▽`;
                                        }
                                    });
                                    stationBetweenElem.appendChild(rideNstopsElem);
                                    stationBetweenElem.appendChild(hiddenStationsContainer);
                                    i += hiddenCount + 1;
                                    stationBetweenElem.style.setProperty("--hidden-count", hiddenCount + 2);
                                }
                            }

                            const arrTimeElem = document.createElement("div");
                            arrTimeElem.className = "arrTime";
                            arrTimeElem.textContent = path[i].arrival_time;
                            stationBetweenElem.appendChild(arrTimeElem);
                            routeContainerElem.appendChild(stationBetweenElem);

                            const stationElem = document.createElement("div");
                            stationElem.className = "station";
                            stationElem.innerHTML = `<a target="_blank" href="/gtfs_viewer_stops.html?popup=1&stop_key=${encodeURIComponent(path[i].stop)}&company=${encodeURIComponent(company)}">${path[i].stop}</a>`;
                            routeContainerElem.appendChild(stationElem);
                        }
                    }
                }
                resultElem.appendChild(routeContainerElem);
            }
        })();
    </script>
</html>
